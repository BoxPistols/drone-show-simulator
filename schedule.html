<style>
.sc-main { flex:1; display:flex; flex-direction:column; min-width:0; overflow: hidden; }
.sc-head { padding:24px 32px 18px; display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid var(--hair); }
.sc-head .jp { font-family:var(--mincho); font-size:26px; letter-spacing:0.08em; font-weight:500; }
.sc-head .en { font-family:"Poppins",sans-serif; font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:var(--pink); margin-top:4px; }
.sc-actions { display:flex; gap:8px; }
.sc-btn { padding:8px 14px; border-radius:8px; border:1px solid var(--hair); background:rgba(255,255,255,0.04); color:var(--text-1); font-size:12px; cursor:pointer; font-family:var(--mincho); letter-spacing:0.06em; }
.sc-btn:hover { background:rgba(255,255,255,0.08); color:#fff; }
.sc-btn.primary { background:var(--moon); color:#02030a; border-color:var(--moon); font-weight:500; }

.sc-body { flex:1; display:flex; overflow:hidden; }
.sc-cal { flex:1; overflow:auto; padding:24px 32px 32px; }
.cal-nav { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px; }
.cal-month { font-family:var(--mincho); font-size:22px; letter-spacing:0.1em; }
.cal-month .en { font-family:"Poppins",sans-serif; font-size:11px; color:var(--text-3); letter-spacing:0.22em; margin-left:10px; text-transform:uppercase; }
.cal-arrows { display:flex; gap:4px; }
.cal-arr { width:32px; height:32px; border:1px solid var(--hair); background:rgba(255,255,255,0.03); color:var(--text-1); border-radius:8px; cursor:pointer; }
.cal-arr:hover { background:rgba(255,255,255,0.08); }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-dow { padding:8px 10px; font-family:"Poppins",sans-serif; font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--text-3); text-align:center; }
.cal-dow.sat { color:#6ed3e6; }
.cal-dow.sun { color:#ff8b91; }
.cal-cell {
  aspect-ratio:1.2;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--hair);
  border-radius:8px;
  padding:8px 10px;
  cursor:pointer;
  position:relative;
  transition:all 0.12s;
  overflow:hidden;
}
.cal-cell:hover { border-color:var(--hair-2); background:rgba(255,255,255,0.04); }
.cal-cell.other { opacity:0.3; }
.cal-cell.today { border-color:var(--pink); }
.cal-cell.selected { background:var(--moon-dim); border-color:var(--moon); }
.cal-day { font-family:"Poppins",sans-serif; font-size:13px; color:var(--text-1); font-variant-numeric:tabular-nums; }
.cal-cell.today .cal-day { color:var(--pink); font-weight:500; }
.cal-events { margin-top:6px; display:flex; flex-direction:column; gap:3px; }
.cal-ev {
  padding:3px 6px;
  border-radius:4px;
  font-size:10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-family:var(--mincho);
  letter-spacing:0.04em;
}
.cal-ev.show { background:rgba(49,169,199,0.2); color:#6ed3e6; border-left:2px solid #31a9c7; }
.cal-ev.rehearsal { background:rgba(251,191,36,0.14); color:#fbbf24; }
.cal-ev.maint { background:rgba(239,68,68,0.12); color:#f87171; }
.cal-weather { position:absolute; top:8px; right:8px; font-size:11px; }

/* Right: details drawer */
.sc-drawer { width:380px; flex-shrink:0; border-left:1px solid var(--hair); background:var(--panel); overflow:auto; padding:24px 24px 32px; }
.dr-date { font-family:var(--mincho); font-size:22px; letter-spacing:0.06em; margin-bottom:2px; }
.dr-date .dow { color:var(--text-3); font-size:13px; margin-left:10px; }
.dr-sub { font-family:"Poppins",sans-serif; font-size:10px; letter-spacing:0.22em; color:var(--moon); text-transform:uppercase; margin-bottom:22px; }

.sect { margin-bottom:22px; }
.sect-head { font-family:"Poppins",sans-serif; font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; display:flex; justify-content:space-between; align-items:baseline; }
.sect-head .jp { font-family:var(--mincho); font-size:11px; color:var(--text-2); letter-spacing:0.14em; text-transform:none; }

.ev-card {
  padding:14px 14px;
  background: rgba(49,169,199,0.08);
  border:1px solid rgba(49,169,199,0.25);
  border-radius:10px;
  margin-bottom:10px;
}
.ev-time { font-family:"Poppins",sans-serif; font-size:11px; color:var(--moon); letter-spacing:0.14em; }
.ev-title { font-family:var(--mincho); font-size:16px; letter-spacing:0.04em; margin:4px 0 2px; }
.ev-venue { font-size:11.5px; color:var(--text-2); }
.ev-meta { margin-top:10px; display:flex; gap:14px; font-size:11px; color:var(--text-2); font-family:var(--mono); letter-spacing:0.04em; }
.ev-meta span b { color:var(--text-0); font-weight:500; margin-left:4px; }

.row { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:12px; }
.row:last-child { border:0; }
.row .l { color:var(--text-2); }
.row .v { color:var(--text-0); font-family:var(--mono); letter-spacing:0.04em; }

.checklist { font-size:12px; }
.check-item { display:flex; align-items:center; gap:10px; padding:8px 0; color:var(--text-1); }
.check-box { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--hair-2); background: transparent; display:grid; place-items:center; font-size:10px; flex-shrink:0; }
.check-box.on { background:var(--ok); border-color:var(--ok); color:#02030a; }
.check-box.warn { background:var(--warn); border-color:var(--warn); color:#02030a; }
.check-item.done { color:var(--text-2); }

.crew-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.crew-ava { width:32px; height:32px; border-radius:50%; display:grid; place-items:center; font-family:"Poppins",sans-serif; font-size:10px; font-weight:500; color:#02030a; }
.crew-info { flex:1; }
.crew-name { font-family:var(--mincho); font-size:13px; color:var(--text-0); }
.crew-role { font-size:10px; color:var(--text-3); font-family:"Poppins",sans-serif; letter-spacing:0.18em; text-transform:uppercase; margin-top:2px; }
.crew-status { font-size:10px; color:var(--ok); font-family:"Poppins",sans-serif; letter-spacing:0.14em; text-transform:uppercase; }

.wx-panel { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.wx-item { background:rgba(255,255,255,0.03); border:1px solid var(--hair); border-radius:8px; padding:10px 12px; }
.wx-k { font-family:"Poppins",sans-serif; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-3); }
.wx-v { font-family:"Poppins",sans-serif; font-size:16px; font-variant-numeric:tabular-nums; margin-top:4px; }
.wx-v.ok { color:var(--ok); }
.wx-v.warn { color:var(--warn); }
</style>
